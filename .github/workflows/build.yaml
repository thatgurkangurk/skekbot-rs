name: Build and Deploy

on:
  push:
    branches: ["main"]
    tags: ["*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "thatgurkangurk/skekbot-rs"
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  BIN_NAME: skekbot_rs
  MISE_EXPERIMENTAL: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: commit
        name: Commit Hash
        uses: prompt/actions-commit-hash@v4

      - id: bin_version
        name: Determine Binary Version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ steps.commit.outputs.short }}-unstable" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: skekbot-rs

      - name: Install mold & build-essential
        run: sudo apt-get update && sudo apt-get install -y mold build-essential

      - name: Build Release Binary
        run: |
          cargo build --release --no-default-features
          mkdir -p ./deploy-out
          cp target/release/${{ env.BIN_NAME }} ./deploy-out/
        env:
          # Keep mold for speed, but standard glibc linking
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
          DATA_DIR: "/app/data"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.commit.outputs.short }},enable=${{ github.ref_name == 'main' }}

            # we test in production fellas
            type=raw,value=we-test-in-production,enable=${{ github.ref_name == 'main' }}

            # on version tag: use the tag itself (e.g., 0.0.1) and "latest"
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.bin_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: Dockerfile.actions

      - name: Trigger Coolify Webhook
        run: |
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK }}' \
               --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'