name: Build Static Image

on:
  push:
    branches: ["main"]
    tags: ["*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "thatgurkangurk/skekbot-rs"

jobs:
  amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - id: commit
        name: Commit Hash
        uses: prompt/actions-commit-hash@v3.0.0
        
      - uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # on push to main: ONLY the short commit SHA
            type=raw,value=${{ steps.commit.outputs.short }},enable=${{ github.ref == 'refs/heads/main' }}
            
            # on version tag: use the tag itself (e.g., 0.0.1) and "latest"
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          file: Dockerfile
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max